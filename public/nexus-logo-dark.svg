<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="brand-d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#9B59D4"/>
    </linearGradient>
    <filter id="shadow-d" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3B82F6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Hexagon mark -->
  <polygon points="36,8 58,20 58,44 36,56 14,44 14,20" fill="url(#brand-d)" filter="url(#shadow-d)"/>
  <polygon points="36,13 53,23 53,42 36,52 19,42 19,23" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- N -->
  <line x1="22" y1="44" x2="22" y2="26" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="22" y1="26" x2="32" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="26" x2="32" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <circle cx="36" cy="35" r="1.5" fill="rgba(255,255,255,0.55)"/>

  <!-- X -->
  <line x1="39" y1="26" x2="50" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="50" y1="26" x2="39" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Corner dots -->
  <circle cx="36" cy="8"  r="2" fill="white" opacity="0.7"/>
  <circle cx="58" cy="20" r="2" fill="white" opacity="0.5"/>
  <circle cx="58" cy="44" r="2" fill="white" opacity="0.5"/>
  <circle cx="36" cy="56" r="2" fill="white" opacity="0.7"/>
  <circle cx="14" cy="44" r="2" fill="white" opacity="0.5"/>
  <circle cx="14" cy="20" r="2" fill="white" opacity="0.5"/>

  <!-- Wordmark — white on dark -->
  <text x="74" y="38" font-family="'Poppins','Lexend Deca','Inter',system-ui,sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="#FFFFFF">NEXUS</text>
  <rect x="74" y="41" width="88" height="2.5" rx="1.25" fill="url(#brand-d)" opacity="0.9"/>
  <text x="74" y="56" font-family="'Poppins','Lexend Deca','Inter',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="3.5" fill="#93C5FD">TRAINING</text>

  <!-- Tagline pill -->
  <rect x="182" y="46" width="84" height="14" rx="7" fill="rgba(255,255,255,0.1)"/>
  <text x="224" y="56.5" font-family="'Poppins','Inter',system-ui,sans-serif" font-size="7.5" font-weight="700" letter-spacing="0.5" text-anchor="middle" fill="rgba(255,255,255,0.6)">BANGALORE #1</text>
</svg>
