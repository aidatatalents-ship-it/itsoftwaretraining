<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <!-- Primary brand gradient: Royal Blue → Violet -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Lighter glow for inner highlight -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#9B59D4"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1D4ED8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════
       ICON MARK — Hexagonal Nexus Node
       Flat-top hexagon, 40×44px, centered at (36,40)
  ════════════════════════════════════ -->

  <!-- Outer hexagon filled with gradient -->
  <!-- flat-top hex: vertices at top-left, top-right, right, bottom-right, bottom-left, left -->
  <polygon
    points="36,8 58,20 58,44 36,56 14,44 14,20"
    fill="url(#brand)"
    filter="url(#shadow)"
  />

  <!-- Inner hexagon — lighter stroke for depth -->
  <polygon
    points="36,13 53,23 53,42 36,52 19,42 19,23"
    fill="none"
    stroke="rgba(255,255,255,0.15)"
    stroke-width="1"
  />

  <!-- ═══ NX Monogram inside hexagon ═══ -->

  <!-- N — left vertical stroke -->
  <line x1="22" y1="44" x2="22" y2="26" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- N — diagonal stroke (top-left to bottom-right) -->
  <line x1="22" y1="26" x2="32" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- N — right vertical stroke -->
  <line x1="32" y1="26" x2="32" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Separator dot — small circle between N and X -->
  <circle cx="36" cy="35" r="1.5" fill="rgba(255,255,255,0.6)"/>

  <!-- X — top-left to bottom-right diagonal -->
  <line x1="39" y1="26" x2="50" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- X — top-right to bottom-left diagonal -->
  <line x1="50" y1="26" x2="39" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Small accent node dots at hex corners (tech/circuit feel) -->
  <circle cx="36" cy="8"  r="2" fill="white" opacity="0.7"/>
  <circle cx="58" cy="20" r="2" fill="white" opacity="0.5"/>
  <circle cx="58" cy="44" r="2" fill="white" opacity="0.5"/>
  <circle cx="36" cy="56" r="2" fill="white" opacity="0.7"/>
  <circle cx="14" cy="44" r="2" fill="white" opacity="0.5"/>
  <circle cx="14" cy="20" r="2" fill="white" opacity="0.5"/>

  <!-- ═══════════════════════════════════
       WORDMARK — "Nexus Training"
  ════════════════════════════════════ -->

  <!-- "NEXUS" — bold, dark navy -->
  <text
    x="74" y="38"
    font-family="'Poppins', 'Lexend Deca', 'Inter', system-ui, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.5"
    fill="#01142F"
  >NEXUS</text>

  <!-- Gradient underline accent under NEXUS -->
  <rect x="74" y="41" width="88" height="2.5" rx="1.25" fill="url(#brand)" opacity="0.85"/>

  <!-- "TRAINING" — medium weight, muted dark -->
  <text
    x="74" y="56"
    font-family="'Poppins', 'Lexend Deca', 'Inter', system-ui, sans-serif"
    font-size="11"
    font-weight="600"
    letter-spacing="3.5"
    fill="#4338CA"
  >TRAINING</text>

  <!-- Bangalore tagline pill -->
  <rect x="182" y="46" width="84" height="14" rx="7" fill="#EEF2FF"/>
  <text
    x="224" y="56.5"
    font-family="'Poppins', 'Inter', system-ui, sans-serif"
    font-size="7.5"
    font-weight="700"
    letter-spacing="0.5"
    text-anchor="middle"
    fill="#4338CA"
  >BANGALORE #1</text>
</svg>
